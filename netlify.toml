# ============================================================
# Hermes IdleViber — Netlify Configuration
# ============================================================

[build]
  publish = "."
  ignore = ".git"

# All routes serve index.html (SPA-ready, though it's a single-page app)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers (relaxed CSP to allow Firebase SDK)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob:; connect-src http://localhost:* ws://localhost:* https:; img-src 'self' data: blob:;"

# Cache static assets
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/sprites/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/midi/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
