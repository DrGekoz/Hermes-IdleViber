# ============================================================
# Hermes IdleViber — Netlify Configuration
# ============================================================

[build]
  publish = "."
  ignore = ".git"

# All routes serve index.html (SPA-ready, though it's a single-page app)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Allow localhost gateway scanning (no-cors fetches)
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://www.gstatic.com https://fonts.googleapis.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      connect-src 'self' https://*.firebaseio.com https://identitytoolkit.googleapis.com
                   https://securetoken.googleapis.com https://firestore.googleapis.com
                   https://www.googleapis.com https://*.googleapis.com
                   http://localhost:* ws://localhost:*;
      img-src 'self' data: blob:;
      frame-src 'self' https://*.firebaseapp.com;
    """

# Cache static assets
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/sprites/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/midi/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
